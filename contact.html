<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-wrapper">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="black" stroke-width="3"/>
                    <path d="M20 10V20H30" stroke="black" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
            <nav>
                <a href="index.html" class="nav-link">HOME</a>
                <a href="about.html" class="nav-link">ABOUT</a>
                <a href="works.html" class="nav-link">WORKS</a>
                <a href="contact.html" class="nav-link active">CONTACT</a>
            </nav>
        </header>

        <main class="inner-page">
            <h1 class="page-title fade-in">Let's Connect<span class="dot">.</span></h1>
            <form class="contact-form fade-in delay-1" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" required placeholder="Tell me about your project..."></textarea>
                </div>
                <button type="submit" class="btn">
                    <span class="btn-text">SEND MESSAGE →</span>
                </button>
            </form>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
